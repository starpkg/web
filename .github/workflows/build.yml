name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions: read-all

jobs:
  ci:
    # Reusable CI lives in 1set/meta — the single source of truth for every
    # Star* module's pipeline. Pinned to a commit SHA for supply-chain safety;
    # bump the pin when meta's workflow changes (Dependabot github-actions can
    # automate this).
    uses: 1set/meta/.github/workflows/go-ci.yml@467ad70ce9b105fbe0902e84c124196f56cb6f21
    with:
      go-floor: "1.19"
    secrets: inherit
