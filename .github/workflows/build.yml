name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions: read-all

jobs:
  ci:
    # Reusable CI lives in 1set/meta — the single source of truth for every
    # Star* module's pipeline. Pinned to a commit SHA for supply-chain safety;
    # bump the pin when meta's workflow changes (Dependabot github-actions can
    # automate this).
    uses: 1set/meta/.github/workflows/go-ci.yml@ad6a22e78c29e069c6d08dae3b0541b630a0bb0c
    with:
      go-floor: "1.19"
      doc-coverage: true
      cov-min: 23
      footprint: true
      footprint-max-mb: 8
    secrets: inherit
